<svg width="100%" viewBox="0 0 820 580" xmlns="http://www.w3.org/2000/svg">

<style>
    text {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 11px;
        fill: #2f2f2f;
    }

    .title {
        font-size: 14px;
        font-weight: 600;
        fill: #3a3a3a;
    }

    .step-number {
        fill: #ffffff;
        font-weight: 600;
    }

    .activation {
        fill: #cfd8e3;
        stroke: #9aa9bc;
    }
</style>

<!-- Title -->
<text x="410" y="25" text-anchor="middle" class="title">
    Iteration 5
</text>

<!-- Main Group -->
<rect x="180" y="40" width="600" height="440" rx="10"
      fill="#eaf2f8" stroke="#c5d6e5"/>

<text x="470" y="60" text-anchor="middle" fill="#4f6f8f">
    Cell_IA Ecosystem
</text>

<!-- Headers -->
<rect x="40" y="80" width="100" height="50" rx="8"
      fill="#ede7f6" stroke="#b39ddb"/>
<text x="90" y="110" text-anchor="middle">User</text>

<rect x="250" y="80" width="140" height="50" rx="8"
      fill="#ddebf7" stroke="#9dc3e6"/>
<text x="320" y="110" text-anchor="middle">LLM Interface</text>

<rect x="560" y="80" width="160" height="50" rx="8"
      fill="#ddebf7" stroke="#9dc3e6"/>
<text x="640" y="110" text-anchor="middle">Cell_IA Framework</text>

<!-- Lifelines -->
<line x1="90" y1="130" x2="90" y2="490"
      stroke="#bbb" stroke-dasharray="4"/>

<line x1="320" y1="130" x2="320" y2="490"
      stroke="#bbb" stroke-dasharray="4"/>

<line x1="640" y1="130" x2="640" y2="490"
      stroke="#bbb" stroke-dasharray="4"/>

<!-- Activation Bars -->
<!-- LLM Interface: classify + generate + self-repair -->
<rect x="312" y="170" width="16" height="170"
      rx="4" class="activation"/>

<!-- Cell_IA Framework: assemble + run -->
<rect x="632" y="330" width="16" height="150"
      rx="4" class="activation"/>

<!-- Footers -->
<rect x="40" y="490" width="100" height="50" rx="8"
      fill="#ede7f6" stroke="#b39ddb"/>
<text x="90" y="520" text-anchor="middle">User</text>

<rect x="250" y="490" width="140" height="50" rx="8"
      fill="#ddebf7" stroke="#9dc3e6"/>
<text x="320" y="520" text-anchor="middle">LLM Interface</text>

<rect x="560" y="490" width="160" height="50" rx="8"
      fill="#ddebf7" stroke="#9dc3e6"/>
<text x="640" y="520" text-anchor="middle">Cell_IA Framework</text>

<!-- Arrow Definitions -->
<defs>
    <marker id="arrow"
            markerWidth="10"
            markerHeight="10"
            refX="9"
            refY="5"
            orient="auto">
        <path d="M0,0 L10,5 L0,10 z"
              fill="#555"/>
    </marker>
</defs>

<!-- STEP 1 -->
<text x="206" y="160" text-anchor="middle">
    Describe the simulation in natural language
</text>
<circle cx="100" cy="175" r="10" fill="#555"/>
<text x="100" y="179" text-anchor="middle"
      class="step-number">1</text>
<line x1="110" y1="175" x2="310" y2="175"
      stroke="#555"
      marker-end="url(#arrow)"/>

<!-- STEP 2 -->
<circle cx="345" cy="250" r="10" fill="#555"/>
<text x="345" y="254" text-anchor="middle"
      class="step-number">2</text>
<path d="M357 250
         C390 225, 432 225, 432 250
         C432 275, 390 275, 357 250"
      fill="none"
      stroke="#555"
      marker-end="url(#arrow)"/>
<text x="565" y="243" text-anchor="middle">
    Classify the request and generate
</text>
<text x="565" y="258" text-anchor="middle">
    the config (.toml) and rule (.jl) files,
</text>
<text x="565" y="273" text-anchor="middle">
    self-repairing on error
</text>

<!-- STEP 3 -->
<text x="490" y="315" text-anchor="middle">
    Hand over the generated files
</text>
<circle cx="345" cy="330" r="10" fill="#555"/>
<text x="345" y="334" text-anchor="middle"
      class="step-number">3</text>
<line x1="357" y1="330" x2="630" y2="330"
      stroke="#555"
      marker-end="url(#arrow)"/>

<!-- STEP 4 -->
<circle cx="663" cy="405" r="10" fill="#555"/>
<text x="663" y="409" text-anchor="middle"
      class="step-number">4</text>
<path d="M675 405
         C708 380, 748 380, 748 405
         C748 430, 708 430, 675 405"
      fill="none"
      stroke="#555"
      marker-end="url(#arrow)"/>
<text x="711" y="365" text-anchor="middle">
    Assemble, validate
</text>
<text x="711" y="380" text-anchor="middle">
    and run the model
</text>

<!-- STEP 5 -->
<text x="360" y="455" text-anchor="middle">
    Simulation results
</text>
<circle cx="630" cy="470" r="10" fill="#555"/>
<text x="630" y="474" text-anchor="middle"
      class="step-number">5</text>
<line x1="620" y1="470" x2="100" y2="470"
      stroke="#777"
      stroke-dasharray="5"
      marker-end="url(#arrow)"/>

</svg>
