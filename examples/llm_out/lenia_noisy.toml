[simulation]
model_name = "Lenia con ruido"
seed = 42
[space]
type = "grid"
dimensions = [128, 128]
periodic = true
metric = "chebyshev"
[agents]
state_type = "Float64"
[population]
pop_density = { "0.0" = 1.0 }
[properties]
lenia_mu         = 0.15
lenia_sigma      = 0.015
dt               = 0.1
kernel_radius    = 13
kernel_type      = "gaussian"
sigma_noise      = 0.04
noise_start_step = 120
noise_end_step   = 999999
noise_scope      = "support"
[rules]
initialization_rule = "uniform_float"
post_init           = "lenia_init!"
model_step          = "lenia_noisy_step!"
[run]
steps  = 400
output = "output_data/lenia_noisy.csv"
adata  = []
mdata  = ["total_energy", "mean_state", "active_cells"]
[visualization]
filename          = "output_videos/lenia_noisy.mp4"
frames            = 400
framerate         = 30
title             = "Lenia con perturbacion"
variable_to_color = "state"
color_scheme      = "viridis"
agent_shape       = "rect"
agent_size        = 1
