[simulation]
model_name = "Orbium"
seed = 42
[space]
type = "grid"
dimensions = [128, 128]
periodic = true
metric = "chebyshev"
[agents]
state_type = "Float64"
[population]
pop_density = { "0.0" = 1.0 }
[properties]
lenia_mu      = 0.15
lenia_sigma   = 0.017
dt            = 0.1
kernel_radius = 13
kernel_type   = "gaussian"
[rules]
initialization_rule = "lenia_orbium"
post_init           = "lenia_init!"
model_step          = "lenia_model_step!"
[visualization]
filename          = "output_videos/orbium.mp4"
frames            = 300
framerate         = 30
title             = "Orbium"
variable_to_color = "state"
color_scheme      = "viridis"
agent_shape       = "rect"
agent_size        = 1
