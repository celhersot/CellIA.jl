[simulation]
model_name = "Island"
seed = 42

[space]
type = "grid"
dimensions = [100, 100]
periodic = true
metric = "chebyshev"

[agents]
state_type = "Float64"    # "Bool" | "Int" | "Float64" | "Symbol"
[population]
pop_density = { "true" = 0.02, "false" = 0.98 }
[properties]
island_color = 0.5  # value between 0.0 (black) and 1.0 (white) for continuous state

[rules]
agent_step = "island_step!"
model_step = "default_model_step!"
initialization_rule = "random"
[visualization]
filename = "output_videos/island.mp4"
title = "Island"
variable_to_color = "state"
color_scheme = { 0.0 = "blue", 0.5 = "beige", 1.0 = "white" }
agent_shape = "circle"
agent_size = 2
framerate = 10
frames = 200