# Simulación 1 — "calcar" una imagen con agentes camaleón.
# Los agentes nacen con color aleatorio, migran hacia las zonas cuyo color objetivo
# se parece al suyo y, una vez asentados, copian el color EXACTO de la imagen.
#
#   julia examples/main.jl examples/image_trace.toml examples/image_trace.jl

[simulation]
model_name = "ImageTrace"
seed = 42

[space]
type = "grid"
dimensions = [96, 96]      # lienzo de MENOR resolución que la imagen (más ligero)
periodic = false
metric = "chebyshev"

[agents]
state_type = "Painter"     # struct definido en image_trace.jl (r, g, b, found)

[properties]
image_path     = "examples/tulipanes.jpg"        # ruta a tu PNG/JPG. Vacío → patrón sintético de demostración.
density        = 0.7       # fracción de celdas con agente (deja hueco para moverse)
search_radius  = 8         # radio (Chebyshev) en el que cada agente busca su color
chameleon      = true      # los agentes asentados copian el color exacto de la imagen
chameleon_rate = 0.15      # velocidad de la transformación camaleónica (0..1)
arrival_tol    = 0.12      # distancia de color para darse por "asentado"
patience       = 3         # pasos bloqueado tras los que un agente se asienta donde está

[rules]
initialization_rule = "empty"            # los agentes se siembran en trace_init!
post_init           = "trace_init!"
model_step          = "trace_model_step!"

[visualization]
filename               = "output_videos/image_trace.mp4"
title                  = "Calcando la imagen (camaleon)"
color_scheme           = "rgb"           # cada agente pinta su celda con su propio color
background_color       = "black"
show_target_background = false
framerate              = 20
frames                 = 220
