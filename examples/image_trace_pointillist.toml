# Variante pointillista: los agentes conservan su color aleatorio y solo buscan su
# sitio; el fondo muestra la imagen objetivo a copiar.
#   julia examples/main.jl examples/image_trace_pointillist.toml examples/image_trace.jl

[simulation]
model_name = "ImageTracePointillist"
seed = 42

[space]
type = "grid"
dimensions = [96, 96]
periodic = false
metric = "chebyshev"

[agents]
state_type = "Painter"

[properties]
image_path     = ""        # PNG/JPG; vacio = patron de demo
density        = 0.6       # menor: deja ver el fondo objetivo
search_radius  = 10
chameleon      = false     # no cambian de color, solo buscan sitio
chameleon_rate = 0.0
arrival_tol    = 0.10
patience       = 5

[rules]
initialization_rule = "empty"
post_init           = "trace_init!"
model_step          = "trace_model_step!"

[visualization]
filename               = "output_videos/image_trace_pointillist.mp4"
title                  = "Buscando su sitio (pointillista)"
color_scheme           = "rgb"
background_color       = "black"
show_target_background = true
framerate              = 20
frames                 = 220
