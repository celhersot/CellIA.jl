[simulation]
model_name = "GameOfLife"
seed = 125

[space]
type = "grid"
dimensions = [200, 200]
periodic = true

[properties]
min_to_live = 2
max_to_live = 3

[agents.population]
pop_density = { alive = 0.4, dead = 0.6 }

[rules]
agent_step = "gol_step!"
model_step = "default_model_step!"
initialization_rule = "random"

[visualization]
filename = "output_videos/gol2.mp4"
title = "Conway's Game of Life"
variable_to_color = "state"
color_scheme = { alive = "white", dead = "black" }
agent_shape = "rect"
agent_size = 4
framerate = 10
frames = 100