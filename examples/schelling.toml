[simulation]
model_name = "RockPaperScissors"
seed = 42

[space]
type = "grid"
dimensions = [50, 50]
periodic = false

[properties]
min_identical = 0.3

[agents]
state_type = "String"

[population]
pop_quantity = {"group1" = 700, "group2" = 700, "group3" = 500}

[rules]
agent_step = "schelling_step!"
model_step = "default_model_step!"
initialization_rule = "random"

[visualization]
filename = "output_videos/schelling.mp4"
title = "Schelling Segregation Model"
variable_to_color = "state"
color_scheme = { "group1" = "orange", "group2" = "green", "group3" = "blue" }
agent_shape = { "group1" = "circle", "group2" = "diamond", "group3" = "rect" }
framerate = 5
frames = 60