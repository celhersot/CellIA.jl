[simulation]
model_name = "Lenia"
seed = 42

[space]
type = "grid"
dimensions = [128, 128]
periodic = true
metric = "chebyshev"

[agents]
state_type = "Float64"

# [population] is not needed with initialization_rule = "uniform_float"
# (every cell gets an independent rand() value during populate_world!)
[population]
pop_density = { "0.0" = 1.0 }

[properties]
lenia_mu      = 0.15
lenia_sigma   = 0.015
dt            = 0.1
kernel_radius = 13
# kernel_type: "gaussian" (default) | "polynomial" | "custom"
# For "custom", set model.properties[:kernel_fn] inside your rules file post_init.
kernel_type   = "gaussian"

[rules]
initialization_rule = "uniform_float"
post_init           = "lenia_init!"
model_step          = "lenia_model_step!"

[visualization]
filename          = "output_videos/lenia.mp4"
frames            = 200
framerate         = 20
title             = "Lenia"
variable_to_color = "state"
color_scheme      = "viridis"
agent_shape       = "rect"
agent_size        = 1
